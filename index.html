<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfólio de Kaio César | Desenvolvedor Mobile We</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="system-status">
            <span>10:16</span>
            <span class="status-icons">
                <i class="icon-signal">📶</i>
                <i class="icon-wifi">WIFI</i>
                <i class="icon-battery">85</i>
            </span>
        </div>
        <div class="logo">
            <span class="kaio">KAIO</span><span class="cesar-neon">CÉSAR</span>
        </div>
    </header>
    
    <main class="hero">
        <div class="hero-content">
            <p class="ready-text">System.Ready(Player_1)</p>
            <h1 class="main-title">
                <span class="kaio">KAIO</span><span class="cesar-neon">CÉSAR</span>
            </h1>
            <p id="typing-subtitutle"></p>
            
            <button class="inventory-button">VER INVENTÁRIO</button>
            
            <div class="main-nav">
                <p class="skill-tree">SKILL TREE</p>
            </div>
        </div>
        
        <div class="phone-skin">
            <div class="phone-screen">
                <img src="crt_computer_fundo.png" alt="Pré-visualização da interface">
            </div>
        </div>
    </main>
    
    <footer>
        <nav class="system-nav">
            <button class="nav-icon-share">🔗</button>
            <button class="nav-icon-edit">✏️</button>
            <button class="nav-icon-search">🔍</button>
            <button class="nav-icon-menu">☰</button>
        </nav>
    </footer>
    
    <script src="script.js"></script>
</body>
</html>
